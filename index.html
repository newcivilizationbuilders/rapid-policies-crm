<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RPA REVENUE COMMAND OS v4.1</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --neon-cyan: #00f0ff;
      --neon-purple: #c724ff;
      --neon-green: #00ff9d;
      --glass: rgba(10,15,40,0.92);
      --glow: 0 0 35px #00f0ff;
    }
    body { background:#05080f; color:#e0f8ff; font-family:'Space Grotesk',sans-serif; margin:0; overflow:hidden; height:100vh; }
    #neural-bg { position:fixed; inset:0; z-index:-2; background:radial-gradient(circle at 50% 20%, rgba(0,240,255,0.1) 0%, transparent 70%); pointer-events:none; }
    .neural-node { position:absolute; width:4px; height:4px; background:#00f0ff; border-radius:50%; box-shadow:0 0 14px #00f0ff; animation:neuralPulse 6s infinite alternate; }
    @keyframes neuralPulse { 0%{transform:scale(0.7);opacity:0.4} 100%{transform:scale(1.8);opacity:1} }

    .omnibar { position:fixed; top:0; left:0; right:0; height:68px; background:rgba(5,8,15,0.95); backdrop-filter:blur(20px); border-bottom:1px solid #00f0ff; z-index:1000; display:flex; align-items:center; padding:0 24px; gap:16px; }
    .command-rail { position:fixed; left:0; top:68px; bottom:0; width:220px; background:var(--glass); border-right:1px solid #00f0ff; padding:24px 16px; overflow-y:auto; z-index:900; }
    .theatre { margin-left:220px; margin-right:320px; margin-top:68px; height:calc(100vh - 68px - 78px); padding:24px; overflow:auto; }
    .intelligence-rail { position:fixed; right:0; top:68px; bottom:78px; width:320px; background:var(--glass); border-left:1px solid #00f0ff; padding:24px 16px; overflow-y:auto; z-index:900; }
    .agent-dock { position:fixed; bottom:0; left:220px; right:320px; height:78px; background:rgba(5,8,15,0.95); backdrop-filter:blur(20px); border-top:1px solid #00f0ff; display:flex; align-items:center; padding:0 16px; gap:12px; overflow-x:auto; z-index:950; }

    .holo-card { background:var(--glass); border:1px solid #00f0ff; border-radius:16px; padding:16px; box-shadow:var(--glow); transition:all .3s cubic-bezier(0.23,1,0.32,1); }
    .holo-card:hover { transform:translateY(-4px); box-shadow:0 0 60px #00f0ff; }

    .river { display:flex; gap:20px; overflow-x:auto; padding:20px 0; position:relative; }
    .stage { flex-shrink:0; width:218px; background:rgba(15,22,55,0.95); border-radius:18px; padding:14px; border:2px solid transparent; position:relative; }
    .stage::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:4px; background:linear-gradient(90deg, transparent, #00f0ff); animation:flowLine 4s linear infinite; }
    @keyframes flowLine { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

    .dossier { position:fixed; inset:0; background:rgba(5,8,15,0.98); z-index:9999; display:none; flex-direction:column; }
    .dossier.open { display:flex; }
    .dossier-header { height:84px; background:rgba(10,15,40,0.98); border-bottom:3px solid #00f0ff; padding:0 32px; display:flex; align-items:center; justify-content:space-between; }
    .dossier-tabs { display:flex; border-bottom:1px solid #00f0ff; }
    .dossier-tab { padding:18px 24px; font-weight:600; border-bottom:3px solid transparent; cursor:pointer; }
    .dossier-tab.active { border-bottom-color:#00f0ff; color:#00f0ff; }

    .pulse { animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const API = 'https://rapid-policies-backend-production.up.railway.app/api';
let _token = null;

const STAGES = [
  {id:'enquiry', label:'ENQUIRY', color:'#00f0ff'},
  {id:'qualified', label:'QUALIFIED', color:'#c724ff'},
  {id:'discovery', label:'DISCOVERY / SCOPE', color:'#ffaa00'},
  {id:'quote_prepared', label:'QUOTE PREPARED', color:'#00ff9d'},
  {id:'quote_sent', label:'QUOTE SENT', color:'#ffaa00'},
  {id:'negotiation', label:'NEGOTIATION', color:'#c724ff'},
  {id:'won', label:'WON', color:'#00ff9d'},
  {id:'invoiced', label:'INVOICED', color:'#ffaa00'},
  {id:'paid', label:'PAID', color:'#ffffff'},
  {id:'onboarding', label:'ONBOARDING', color:'#00f0ff'},
  {id:'active', label:'ACTIVE SERVICE', color:'#c724ff'},
  {id:'completed', label:'COMPLETED', color:'#00ff9d'},
  {id:'reactivation', label:'REACTIVATION', color:'#ffaa00'}
];

const App = () => {
  const [user, setUser] = useState(null);
  const [pageMode, setPageMode] = useState('Director');
  const [selectedContact, setSelectedContact] = useState(null);
  const [contacts, setContacts] = useState([]);
  const [stageData, setStageData] = useState(STAGES.map(s => ({...s, count: Math.floor(Math.random()*38)+8})));
  const [alertCount, setAlertCount] = useState(12);
  const [agentStats, setAgentStats] = useState({});

  // Simulate real WebSocket pulsing
  useEffect(() => {
    const wsPulse = setInterval(() => {
      setStageData(prev => prev.map(s => ({...s, count: Math.max(3, s.count + (Math.random()*4 - 2))})));
      setAlertCount(prev => Math.max(3, prev + (Math.random()*3 - 1)));
      setAgentStats(prev => ({
        ...prev,
        'Lead Hunter': Math.floor(Math.random()*6)+2,
        'Quote Chaser': Math.floor(Math.random()*5)+1
      }));
    }, 4200);

    // Neural background
    const bg = document.createElement('div');
    bg.id = 'neural-bg';
    document.body.appendChild(bg);
    for(let i=0;i<110;i++){
      const n = document.createElement('div');
      n.className='neural-node';
      n.style.left = Math.random()*100+'%';
      n.style.top = Math.random()*100+'%';
      n.style.animationDelay = `-${Math.random()*8}s`;
      bg.appendChild(n);
    }
    return () => { clearInterval(wsPulse); bg.remove(); };
  }, []);

  if(!user) return React.createElement(Login, {onLogin: u=>{ _token=u.token; setUser(u); }});

  return React.createElement('div', {style:{height:'100vh', display:'flex', flexDirection:'column'}},
    // Omnibar
    React.createElement('div', {className:'omnibar'},
      React.createElement('div', {style:{fontFamily:'Orbitron', fontSize:'28px', color:'#00f0ff'}}, 'RPA'),
      React.createElement('input', {placeholder:'Command the OS… (type or speak)', style:{flex:1, margin:'0 24px', padding:'14px 20px', background:'#0a1128', border:'2px solid #00f0ff', borderRadius:'9999px', color:'#fff'}}),
      React.createElement('button', {style:{background:'#00f0ff', color:'#05080f', borderRadius:'9999px', padding:'8px 24px', fontWeight:700}}, '🎤 VOICE'),
      React.createElement('div', {style:{display:'flex', gap:8}}, 
        ['Rep','Manager','Director','Finance'].map(m => React.createElement('button', {key:m, onClick:()=>setPageMode(m), style:{padding:'6px 16px', borderRadius:'9999px', background:pageMode===m?'#00f0ff':'transparent', color:pageMode===m?'#05080f':'#fff'}}, m))
      ),
      React.createElement('div', {style:{marginLeft:'auto', display:'flex', alignItems:'center', gap:16}},
        React.createElement('div', {className:'pulse holo-card', style:{padding:'6px 18px', fontSize:'15px', fontWeight:700}}, `${alertCount} LIVE ALERTS`),
        React.createElement('div', {style:{fontSize:'32px', color:'#00f0ff'}}, '🌀')
      )
    ),

    // Main deck
    React.createElement('div', {style:{flex:1, display:'flex', overflow:'hidden'}},
      // Left rail
      React.createElement('div', {className:'command-rail'},
        React.createElement('h4', {style:{color:'#00f0ff', marginBottom:'20px'}}, 'REVENUE COMMAND VECTORS'),
        React.createElement('div', {className:'holo-card pulse', style:{marginBottom:'12px'}}, 'Revenue In Play $214k'),
        React.createElement('div', {className:'holo-card', style:{marginBottom:'12px'}}, 'Revenue At Risk $41k'),
        React.createElement('div', {className:'holo-card', style:{marginBottom:'12px'}}, 'Overdue Follow-ups 11'),
        React.createElement('div', {className:'holo-card', style:{marginBottom:'12px'}}, 'Aging Quotes 17'),
        React.createElement('div', {className:'holo-card', style:{marginBottom:'12px'}}, 'Invoice Pressure 8'),
        React.createElement('div', {className:'holo-card', style:{marginBottom:'12px'}}, 'Sentiment Risk 4'),
        React.createElement('div', {className:'holo-card'}, 'Escalations 3')
      ),

      // Centre Theatre
      React.createElement('div', {className:'theatre'},
        React.createElement('h1', {style:{fontFamily:'Orbitron', fontSize:'42px', marginBottom:'8px'}}, 'PIPELINE RIVER'),
        React.createElement('div', {className:'river'},
          stageData.map(stage => 
            React.createElement('div', {
              key:stage.id,
              className:'stage',
              style:{borderColor:stage.color},
              onClick: () => setSelectedContact({id:Math.random(), name:'Sunshine House Maleny', stage:stage.label, value:47200})
            },
              React.createElement('div', {style:{fontFamily:'Orbitron', color:stage.color, fontSize:'14px', fontWeight:700}}, stage.label),
              React.createElement('div', {style:{fontSize:'38px', fontWeight:800, lineHeight:1}}, stage.count),
              React.createElement('div', {style:{fontSize:'12px', opacity:0.8}}, '2.8d dwell • 91% conv')
            )
          )
        )
      ),

      // Right rail
      React.createElement('div', {className:'intelligence-rail'},
        React.createElement('h4', {style:{color:'#00f0ff', marginBottom:'16px'}}, 'INTELLIGENCE FEED'),
        React.createElement('div', {className:'holo-card', style:{marginBottom:'12px'}}, '🔥 Today’s Hit: Sunshine House Maleny — 94% close probability'),
        React.createElement('div', {className:'holo-card', style:{marginBottom:'12px'}}, 'AI Next Best Action: Personalised follow-up to Quest Coaching'),
        React.createElement('div', {className:'holo-card', style:{marginBottom:'12px'}}, '3 deals moved to Negotiation in last 4 minutes'),
        React.createElement('div', {className:'holo-card'}, 'Ghosting accounts: 2 aged-care leads silent >14 days')
      )
    ),

    // Agent Dock with pulsing
    React.createElement('div', {className:'agent-dock'},
      ['Lead Hunter','Follow-up Hunter','Quote Chaser','Invoice Guard','Churn Guard','Upsell Scout','Reactivation Bot','Proposal Drafter'].map(name => 
        React.createElement('div', {
          key:name,
          className:'holo-card',
          style:{width:160, height:64, padding:10, display:'flex', flexDirection:'column', justifyContent:'space-between', fontSize:'13px'}
        },
          React.createElement('div', {style:{fontWeight:700}}, name),
          React.createElement('div', {style:{display:'flex', justifyContent:'space-between'}},
            React.createElement('span', null, `${agentStats[name]||Math.floor(Math.random()*5)+1} running`),
            React.createElement('span', {className:'pulse', style:{color:'#00ff9d'}}, 'LIVE')
          )
        )
      )
    ),

    // FULL-SCREEN DOSSIER – ALL TABS EXPANDED
    selectedContact && React.createElement('div', {className:'dossier open'},
      React.createElement('div', {className:'dossier-header'},
        React.createElement('div', null,
          React.createElement('div', {style:{fontSize:'26px', fontWeight:700}}, selectedContact.name),
          React.createElement('div', {style:{color:'#00ff9d', fontSize:'15px'}}, `${selectedContact.stage} • $${selectedContact.value} • Next: Send revised quote`)
        ),
        React.createElement('button', {onClick:()=>setSelectedContact(null), style:{fontSize:'36px', background:'none', border:'none', color:'#ff3b6b'}}, '✕')
      ),

      // Tabs
      React.createElement('div', {className:'dossier-tabs'},
        ['Overview','Timeline','Communications','Commercial','Tasks','Documents','Intelligence','Audit'].map(tab => 
          React.createElement('div', {key:tab, className:`dossier-tab ${tab==='Overview'?'active':''}`}, tab)
        )
      ),

      // Expanded tab content (Overview is fully fleshed out; others are rich placeholders)
      React.createElement('div', {style:{flex:1, padding:'32px', overflowY:'auto', display:'flex', flexDirection:'column', gap:'24px'}},
        // Overview
        React.createElement('div', {className:'holo-card'},
          React.createElement('h3', null, 'Company Health'),
          React.createElement('div', {style:{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'16px'}},
            React.createElement('div', null, React.createElement('div', {style:{fontSize:'48px', fontWeight:800, color:'#00ff9d'}}, '94%'), 'Close Probability'),
            React.createElement('div', null, React.createElement('div', {style:{fontSize:'48px', fontWeight:800, color:'#ffaa00'}}, '2.8d'), 'Avg Dwell'),
            React.createElement('div', null, React.createElement('div', {style:{fontSize:'48px', fontWeight:800, color:'#c724ff'}}, '$47.2k'), 'Deal Value')
          )
        ),
        // Timeline
        React.createElement('div', {className:'holo-card'}, 
          React.createElement('h3', null, 'Timeline'),
          React.createElement('div', {style:{marginTop:'16px'}}, 
            '• 11:42 — Quote Sent (AI drafted)',
            React.createElement('br', null),
            '• 09:15 — Discovery call completed • Positive sentiment',
            React.createElement('br', null),
            '• Yesterday — Stage moved from Qualified → Discovery'
          )
        ),
        // Communications
        React.createElement('div', {className:'holo-card'}, 
          React.createElement('h3', null, 'Communications'),
          React.createElement('div', null, 'Email thread • Call log • Latest: "Looking forward to your revised quote"')
        ),
        // Commercial
        React.createElement('div', {className:'holo-card'}, React.createElement('h3', null, 'Commercial'), 'Xero invoice #INV-3921 • $47,200 • Due in 14 days'),
        // Intelligence
        React.createElement('div', {className:'holo-card'}, 
          React.createElement('h3', null, 'AI Intelligence'),
          React.createElement('p', null, 'Risk of ghosting: Low • Upsell opportunity: Home & Contents add-on ($8k) • Recommended script ready')
        )
      )
    )
  );
};

const Login = ({onLogin}) => React.createElement('div', {style:{position:'fixed', inset:0, background:'#05080f', display:'flex', alignItems:'center', justifyContent:'center'}},
  React.createElement('div', {className:'holo-card', style:{width:440, padding:56, textAlign:'center'}},
    React.createElement('div', {style:{fontFamily:'Orbitron', fontSize:62, color:'#00f0ff'}}, 'RPA'),
    React.createElement('h2', {style:{margin:'20px 0'}}, 'REVENUE COMMAND OS v4.1'),
    React.createElement('form', {onSubmit:e=>{e.preventDefault(); onLogin({token:'demo', name:'Andrew'});}},
      React.createElement('input', {type:'email', placeholder:'admin@rapidpolicies.com.au', style:{width:'100%', padding:18, marginBottom:16, background:'#0a1128', border:'2px solid #00f0ff', borderRadius:12}}),
      React.createElement('input', {type:'password', placeholder:'••••••••', style:{width:'100%', padding:18, marginBottom:24, background:'#0a1128', border:'2px solid #00f0ff', borderRadius:12}}),
      React.createElement('button', {type:'submit', style:{width:'100%', padding:20, background:'linear-gradient(#00f0ff,#c724ff)', color:'#05080f', fontSize:19, fontWeight:700, borderRadius:9999}}, 'ENTER COMMAND CORE')
    )
  )
);

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
