<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RPA COMMAND CENTRE</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root { --neon-cyan: #00f0ff; --neon-purple: #c724ff; --glass: rgba(10,15,40,0.92); --glow: 0 0 40px #00f0ff; }
    body { background:#05080f; color:#e0f8ff; font-family:'Space Grotesk',sans-serif; margin:0; overflow:hidden; height:100vh; }
    #neural-bg { position:fixed; inset:0; z-index:-2; background:radial-gradient(circle at 50% 20%, rgba(0,240,255,0.12) 0%, transparent 70%); pointer-events:none; }
    .neural-node { position:absolute; width:4px; height:4px; background:#00f0ff; border-radius:50%; box-shadow:0 0 14px #00f0ff; animation:neuralPulse 6s infinite alternate; }
    @keyframes neuralPulse { 0%{transform:scale(0.7);opacity:0.4} 100%{transform:scale(1.8);opacity:1} }
    .rpa-logo { font-family:'Orbitron'; font-size:128px; font-weight:700; background:linear-gradient(90deg,#00f0ff,#c724ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-shadow:0 0 80px #00f0ff; animation:pulse 2.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.85} }
    .holo-card { background:var(--glass); border:1px solid #00f0ff; border-radius:16px; padding:14px; box-shadow:var(--glow); transition:all .3s; cursor:pointer; }
    .holo-card:hover { transform:translateY(-4px); box-shadow:0 0 60px #00f0ff; }
    .stage { flex-shrink:0; width:260px; background:rgba(15,22,55,0.95); border-radius:18px; padding:14px; border:2px solid transparent; min-height:520px; }
    .card { background:#0a1128; border-radius:12px; padding:12px; margin-bottom:10px; box-shadow:0 4px 15px rgba(0,0,0,0.4); cursor:grab; }
    .modal { position:fixed; inset:0; background:rgba(5,8,15,0.95); z-index:10000; display:flex; align-items:center; justify-content:center; }
    .modal-content { background:var(--glass); border:2px solid #00f0ff; border-radius:20px; width:90%; max-width:900px; max-height:90vh; overflow:auto; padding:24px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;
const API = 'https://rapid-policies-backend-production.up.railway.app/api';
let _token = null;

const STAGES = [
  {id:'enquiry', label:'ENQUIRY', color:'#00f0ff'},
  {id:'qualified', label:'QUALIFIED', color:'#c724ff'},
  {id:'discovery', label:'DISCOVERY / SCOPE', color:'#ffaa00'},
  {id:'quote_prepared', label:'QUOTE PREPARED', color:'#00ff9d'},
  {id:'quote_sent', label:'QUOTE SENT', color:'#ffaa00'},
  {id:'negotiation', label:'NEGOTIATION', color:'#c724ff'},
  {id:'won', label:'WON', color:'#00ff9d'},
  {id:'invoiced', label:'INVOICED', color:'#ffaa00'},
  {id:'paid', label:'PAID', color:'#ffffff'},
  {id:'onboarding', label:'ONBOARDING', color:'#00f0ff'},
  {id:'active', label:'ACTIVE SERVICE', color:'#c724ff'},
  {id:'completed', label:'COMPLETED', color:'#00ff9d'},
  {id:'reactivation', label:'REACTIVATION', color:'#ffaa00'}
];

const App = () => {
  const [user, setUser] = useState(null);
  const [contacts, setContacts] = useState([]);
  const [dragging, setDragging] = useState(null);
  const [selectedContact, setSelectedContact] = useState(null);
  const [emails, setEmails] = useState([]);
  const [calls, setCalls] = useState([]);

  // Real login with pre-filled email
  const [email, setEmail] = useState('andrew@rapidpolicies.com.au');
  const [password, setPassword] = useState('');
  const [loginError, setLoginError] = useState('');

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoginError('');
    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Login failed');
      _token = data.token || data.access_token;
      setUser({name: data.name || 'Andrew'});
      fetchContacts();
    } catch (err) {
      setLoginError(err.message || 'Access denied');
    }
  };

  const fetchContacts = async () => {
    try {
      const res = await fetch(`${API}/contacts?limit=500`, {
        headers: { Authorization: `Bearer ${_token}` }
      });
      const data = await res.json();
      setContacts(data.data || data || []);
    } catch(e) { console.error(e); }
  };

  const fetchContactDetails = async (contactId) => {
    try {
      const emailRes = await fetch(`${API}/emails?contact_id=${contactId}`, { headers: { Authorization: `Bearer ${_token}` } });
      const emailData = await emailRes.json();
      setEmails(emailData.data || emailData || []);

      const callRes = await fetch(`${API}/calls?contact_id=${contactId}`, { headers: { Authorization: `Bearer ${_token}` } });
      const callData = await callRes.json();
      setCalls(callData.data || callData || []);
    } catch(e) { console.error(e); }
  };

  const handleDrop = async (e, newStage) => {
    e.preventDefault();
    if (!dragging) return;
    try {
      await fetch(`${API}/contacts/${dragging.id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${_token}` },
        body: JSON.stringify({ status: newStage })
      });
      setContacts(prev => prev.map(c => c.id === dragging.id ? {...c, stage: newStage} : c));
    } catch(e) { console.error(e); }
    setDragging(null);
  };

  return React.createElement('div', {style:{height:'100vh', display:'flex', flexDirection:'column'}},
    !user && React.createElement('div', {className:'login-splash'}, 
      React.createElement('div', {style:{textAlign:'center'}},
        React.createElement('div', {className:'rpa-logo'}, 'RPA'),
        React.createElement('div', {style:{fontSize:'28px', color:'#8899cc', marginTop:'-30px'}}, 'COMMAND CENTRE'),
        React.createElement('form', {onSubmit:handleLogin, style:{marginTop:'40px', width:'320px'}},
          React.createElement('input', {
            type:'email',
            value:email,
            onChange:e=>setEmail(e.target.value),
            style:{width:'100%', padding:'16px', marginBottom:'12px', background:'#0a1128', border:'2px solid #00f0ff', borderRadius:12, color:'#fff', fontSize:'16px'}
          }),
          React.createElement('input', {
            type:'password',
            placeholder:'Password',
            value:password,
            onChange:e=>setPassword(e.target.value),
            style:{width:'100%', padding:'16px', marginBottom:'20px', background:'#0a1128', border:'2px solid #00f0ff', borderRadius:12, color:'#fff', fontSize:'16px'}
          }),
          loginError && React.createElement('div', {style:{color:'#ff3b6b', marginBottom:'12px'}}, loginError),
          React.createElement('button', {
            type:'submit',
            style:{width:'100%', padding:'18px', background:'linear-gradient(#00f0ff,#c724ff)', color:'#05080f', borderRadius:'9999px', fontWeight:700, fontSize:'18px'}
          }, 'ACCESS COMMAND CENTRE')
        )
      )
    ),

    /* Pipeline River + full futuristic UI */
    user && React.createElement('div', {className:'theatre'},
      React.createElement('h1', {style:{fontFamily:'Orbitron', fontSize:'42px'}}, 'PIPELINE RIVER'),
      React.createElement('div', {className:'river'},
        STAGES.map(stage => 
          React.createElement('div', {
            key:stage.id,
            className:'stage',
            style:{borderColor:stage.color},
            onDragOver:e=>e.preventDefault(),
            onDrop:e=>handleDrop(e, stage.id)
          },
            React.createElement('div', {className:'stage-header', style:{color:stage.color}}, stage.label),
            contacts.filter(c=>c.stage===stage.id).map(contact =>
              React.createElement('div', {
                key:contact.id,
                className:'card holo-card',
                draggable:true,
                onDragStart:e=>setDragging(contact),
                onClick:()=>{ setSelectedContact(contact); fetchContactDetails(contact.id); }
              }, contact.name)
            )
          )
        )
      )
    ),

    /* Full dossier with Gmail + Synthflow */
    selectedContact && React.createElement('div', {className:'modal', onClick:()=>setSelectedContact(null)},
      React.createElement('div', {className:'modal-content', onClick:e=>e.stopImmediatePropagation()},
        React.createElement('h2', null, selectedContact.name),
        React.createElement('h3', null, '📧 Gmail Emails'),
        emails.length === 0 ? React.createElement('p', null, 'No emails yet') : emails.map(em => React.createElement('div', {key:em.id, style:{padding:'12px', background:'#0a1128', marginBottom:'8px', borderRadius:'12px'}}, em.subject || '(no subject)')),
        React.createElement('h3', {style:{marginTop:'24px'}}, '📞 Synthflow Calls'),
        calls.length === 0 ? React.createElement('p', null, 'No Synthflow calls yet') : calls.map(call => React.createElement('div', {key:call.id, style:{padding:'12px', background:'#0a1128', marginBottom:'8px', borderRadius:'12px'}}, `Call ${new Date(call.created_at).toLocaleString()}`))
      )
    )
  );
};

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
