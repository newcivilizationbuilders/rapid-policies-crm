<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rapid Policies CRM</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3248;
      --accent: #4f8ef7;
      --accent2: #6c63ff;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text: #e8eaf6;
      --text2: #8892b0;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    a { color: var(--accent); text-decoration: none; }
    button { cursor: pointer; border: none; font-family: inherit; }

    /* 脙垄脗聰脗聙脙垄脗聰脗聙 Auth 脙垄脗聰脗聙脙垄脗聰脗聙 */
    .auth-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: radial-gradient(ellipse at 60% 20%, #1a2340 0%, var(--bg) 70%); }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: var(--shadow); }
    .auth-card h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
    .auth-card p { color: var(--text2); margin-bottom: 32px; font-size: .9rem; }
    .auth-card label { display: block; font-size: .82rem; color: var(--text2); margin-bottom: 6px; }
    .auth-card input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-size: .95rem; outline: none; transition: border .2s; margin-bottom: 18px; }
    .auth-card input:focus { border-color: var(--accent); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: .95rem; font-weight: 600; width: 100%; transition: opacity .2s; }
    .btn-primary:hover { opacity: .85; }
    .err-msg { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: .88rem; }
    .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; margin-bottom: 20px; }

    /* 脙垄脗聰脗聙脙垄脗聰脗聙 Layout 脙垄脗聰脗聙脙垄脗聰脗聙 */
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 10; }
    .sidebar-logo { padding: 0 20px 24px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
    .sidebar-logo .icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .sidebar-logo span { font-weight: 700; font-size: 1rem; color: var(--text); line-height: 1.2; }
    .sidebar-logo small { display: block; font-size: .7rem; color: var(--text2); font-weight: 400; }
    nav a { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: var(--text2); font-size: .9rem; border-radius: 0; transition: background .15s, color .15s; margin: 1px 8px; border-radius: 8px; }
    nav a:hover { background: var(--surface2); color: var(--text); }
    nav a.active { background: var(--surface2); color: var(--accent); }
    nav a .nav-icon { font-size: 1rem; width: 18px; text-align: center; }
    .sidebar-bottom { margin-top: auto; padding: 12px 8px 0; border-top: 1px solid var(--border); }
    .user-pill { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; }
    .user-pill:hover { background: var(--surface2); }
    .avatar { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .8rem; font-weight: 700; color: #fff; flex-shrink: 0; }
    .user-pill-info span { display: block; font-size: .85rem; font-weight: 600; }
    .user-pill-info small { font-size: .72rem; color: var(--text2); }
    .btn-logout { background: none; color: var(--text2); font-size: .75rem; padding: 4px 8px; border-radius: 6px; }
    .btn-logout:hover { color: var(--danger); }

    .main { margin-left: 240px; flex: 1; padding: 32px; min-height: 100vh; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .topbar h2 { font-size: 1.4rem; font-weight: 700; }
    .topbar-actions { display: flex; gap: 10px; }
    .btn-sm { padding: 8px 16px; border-radius: 8px; font-size: .85rem; font-weight: 600; }
    .btn-outline { background: none; border: 1px solid var(--border); color: var(--text2); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-add { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
    .btn-add:hover { opacity: .85; }

    /* 脙垄脗聰脗聙脙垄脗聰脗聙 Stats 脙垄脗聰脗聙脙垄脗聰脗聙 */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .stat-label { font-size: .78rem; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .04em; }
    .stat-value { font-size: 2rem; font-weight: 700; line-height: 1; }
    .stat-sub { font-size: .78rem; color: var(--text2); margin-top: 6px; }
    .stat-card.accent { border-color: rgba(79,142,247,.3); background: rgba(79,142,247,.06); }
    .stat-card.success { border-color: rgba(34,197,94,.3); background: rgba(34,197,94,.06); }
    .stat-card.warning { border-color: rgba(245,158,11,.3); background: rgba(245,158,11,.06); }
    .stat-card.danger { border-color: rgba(239,68,68,.3); background: rgba(239,68,68,.06); }

    /* 脙垄脗聰脗聙脙垄脗聰脗聙 Table 脙垄脗聰脗聙脙垄脗聰脗聙 */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-header h3 { font-size: 1rem; font-weight: 600; }
    .search-bar { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; }
    .search-bar input { background: none; border: none; padding: 8px 0; color: var(--text); font-size: .88rem; outline: none; width: 200px; }
    .search-bar input::placeholder { color: var(--text2); }
    .filter-row { padding: 12px 20px; display: flex; gap: 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .filter-btn { background: none; border: 1px solid var(--border); color: var(--text2); padding: 5px 12px; border-radius: 20px; font-size: .8rem; transition: all .15s; }
    .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 20px; font-size: .78rem; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); }
    td { padding: 14px 20px; font-size: .88rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600; }
    .badge.new { background: rgba(79,142,247,.2); color: #93c5fd; }
    .badge.contacted { background: rgba(245,158,11,.2); color: #fcd34d; }
    .badge.qualified { background: rgba(34,197,94,.2); color: #86efac; }
    .badge.closed { background: rgba(108,99,255,.2); color: #a5b4fc; }
    .badge.lost { background: rgba(239,68,68,.2); color: #fca5a5; }
    .row-actions { display: flex; gap: 6px; }
    .btn-icon { background: none; border: 1px solid var(--border); color: var(--text2); padding: 5px 8px; border-radius: 6px; font-size: .8rem; transition: all .15s; }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
    .btn-icon.danger:hover { border-color: var(--danger); color: var(--danger); }
    .pagination { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); font-size: .83rem; color: var(--text2); }
    .page-btns { display: flex; gap: 4px; }
    .page-btns button { background: none; border: 1px solid var(--border); color: var(--text2); padding: 5px 10px; border-radius: 6px; font-size: .82rem; }
    .page-btns button.active, .page-btns button:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* 脙垄脗聰脗聙脙垄脗聰脗聙 Modal 脙垄脗聰脗聙脙垄脗聰脗聙 */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 520px; box-shadow: var(--shadow); max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-header h3 { font-size: 1.1rem; font-weight: 600; }
    .modal-body { padding: 20px 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
    .btn-close { background: none; border: none; color: var(--text2); font-size: 1.2rem; line-height: 1; padding: 2px; }
    .btn-close:hover { color: var(--text); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .82rem; color: var(--text2); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: .9rem; outline: none; font-family: inherit; transition: border .2s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .btn-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 9px 18px; border-radius: 8px; font-size: .88rem; }
    .btn-cancel:hover { color: var(--text); }
    .btn-save { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; padding: 9px 18px; border-radius: 8px; font-size: .88rem; font-weight: 600; }
    .btn-save:hover { opacity: .85; }

    /* 脙垄脗聰脗聙脙垄脗聰脗聙 Detail Panel 脙垄脗聰脗聙脙垄脗聰脗聙 */
    .detail-wrap { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
    .detail-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
    .detail-name { font-size: 1.3rem; font-weight: 700; }
    .detail-email { color: var(--text2); font-size: .88rem; margin-top: 2px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .info-item label { font-size: .75rem; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 4px; }
    .info-item span { font-size: .9rem; }
    .section-title { font-size: .85rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
    .timeline { list-style: none; }
    .timeline li { display: flex; gap: 12px; padding-bottom: 16px; position: relative; }
    .timeline li::before { content: ''; position: absolute; left: 11px; top: 24px; bottom: 0; width: 1px; background: var(--border); }
    .timeline li:last-child::before { display: none; }
    .tl-dot { width: 22px; height: 22px; border-radius: 50%; background: var(--surface2); border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: .65rem; }
    .tl-dot.blue { background: rgba(79,142,247,.2); border-color: var(--accent); color: var(--accent); }
    .tl-dot.green { background: rgba(34,197,94,.2); border-color: var(--success); color: var(--success); }
    .tl-content p { font-size: .87rem; }
    .tl-content small { font-size: .75rem; color: var(--text2); }
    .notes-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-top: 8px; }
    .notes-box textarea { width: 100%; background: none; border: none; color: var(--text); font-size: .88rem; font-family: inherit; resize: vertical; min-height: 80px; outline: none; }
    .notes-save { background: var(--accent); color: #fff; border-radius: 6px; padding: 6px 14px; font-size: .82rem; margin-top: 8px; }

    /* 脙垄脗聰脗聙脙垄脗聰脗聙 Settings 脙垄脗聰脗聙脙垄脗聰脗聙 */
    .settings-grid { display: grid; gap: 20px; }
    .settings-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .settings-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .settings-card p { font-size: .83rem; color: var(--text2); margin-bottom: 20px; }
    .settings-card .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text2); }
    .settings-card .status-dot.connected { background: var(--success); }
    .btn-connect { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 9px 18px; border-radius: 8px; font-size: .88rem; font-weight: 600; transition: all .2s; }
    .btn-connect:hover { border-color: var(--accent); color: var(--accent); }
    .btn-connect.connected { border-color: rgba(34,197,94,.4); color: var(--success); }
    .integration-row { display: flex; align-items: center; justify-content: space-between; }
    .integration-info h4 { font-size: .92rem; font-weight: 600; }
    .integration-info p { font-size: .8rem; color: var(--text2); margin: 0; }

    /* 脙垄脗聰脗聙脙垄脗聰脗聙 Empty / Loading 脙垄脗聰脗聙脙垄脗聰脗聙 */
    .empty { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-row td { text-align: center; padding: 40px; color: var(--text2); }

    /* 脙垄脗聰脗聙脙垄脗聰脗聙 Toast 脙垄脗聰脗聙脙垄脗聰脗聙 */
    .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: .88rem; box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px; min-width: 240px; animation: slideIn .2s ease; }
    .toast.success { border-color: rgba(34,197,94,.4); }
    .toast.error { border-color: rgba(239,68,68,.4); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }

    /* 脙垄脗聰脗聙脙垄脗聰脗聙 Responsive 脙垄脗聰脗聙脙垄脗聰脗聙 */
    @media (max-width: 1100px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .detail-wrap { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .main { margin-left: 0; padding: 20px; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

const API_BASE = 'https://rapid-policies-backend-production.up.railway.app/api';

/* 脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬
   AUTH CONTEXT
脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬 */
const AuthContext = createContext(null);
function useAuth() { return useContext(AuthContext); }

function AuthProvider({ children }) {
  const [token, setToken] = useState(() => localStorage.getItem('rp_token'));
  const [user, setUser] = useState(() => { try { return JSON.parse(localStorage.getItem('rp_user')); } catch { return null; } });

  const login = useCallback((tok, usr) => {
    localStorage.setItem('rp_token', tok);
    localStorage.setItem('rp_user', JSON.stringify(usr));
    setToken(tok);
    setUser(usr);
  }, []);

  const logout = useCallback(() => {
    localStorage.removeItem('rp_token');
    localStorage.removeItem('rp_user');
    setToken(null);
    setUser(null);
  }, []);

  const apiFetch = useCallback(async (path, opts = {}) => {
    const res = await fetch(`${API_BASE}${path}`, {
      ...opts,
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) }
    });
    if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
    return res;
  }, [token, logout]);

  return React.createElement(AuthContext.Provider, { value: { token, user, login, logout, apiFetch } }, children);
}

脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬脙垄脗聲脗聬 */
function App() {
  const { token, apiFetch } = useAuth();
  const [page, setPage] = useState('dashboard');
  const [leads, setLeads] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!token) return;
    setLoading(true);
    apiFetch('/leads')
      .then(r => r.json())
      .then(d => setLeads(Array.isArray(d) ? d : d.leads || d.data || []))
      .catch(() => setLeads([]))
      .finally(() => setLoading(false));
  }, [token]);

  if (!token) return React.createElement(LoginPage);

  let content;
  if (page === 'dashboard') content = React.createElement(Dashboard, { leads });
  else if (page === 'leads') content = React.createElement(LeadsPage, { leads, setLeads, loading });
  else if (page === 'settings') content = React.createElement(SettingsPage);

  return React.createElement('div', { className: 'app' },
    React.createElement(Sidebar, { page, setPage }),
    React.createElement('main', { className: 'main' }, content)
  );
}
