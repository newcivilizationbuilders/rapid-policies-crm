/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #080c18;
  color: #e2e8f8;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===== CSS CUSTOM PROPERTIES ===== */
:root {
  --bg0: #080c18;
  --bg1: #0d1224;
  --bg2: rgba(26,31,56,0.75);
  --bg3: rgba(36,43,72,0.85);
  --glass: rgba(16,22,44,0.8);
  --glass2: rgba(20,28,52,0.9);
  --border: rgba(255,255,255,0.08);
  --border2: rgba(0,212,255,0.25);
  --text: #e8eeff;
  --text2: #8899cc;
  --text3: #4a5a88;
  --blue: #00d4ff;
  --blue2: #0ea5e9;
  --purple: #a855f7;
  --green: #00ff88;
  --amber: #f59e0b;
  --red: #ff3b6b;
  --cyan: #22d3ee;
  --nav-h: 64px;
  --sidebar-w: 240px;
  --radius: 16px;
  --radius-sm: 10px;
  --glow-blue: 0 0 20px rgba(0,212,255,0.35);
  --glow-purple: 0 0 20px rgba(168,85,247,0.35);
  --glow-green: 0 0 20px rgba(0,255,136,0.35);
  --glow-red: 0 0 20px rgba(255,59,107,0.4);
}

/* ===== SCROLLBARS ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,212,255,0.4); }

/* ===== ANIMATIONS ===== */
@keyframes gradientShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}
@keyframes slideInRight {
  from { transform: translateX(100%); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
@keyframes slideUp {
  from { transform: translateY(100%); } to { transform: translateY(0); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse-hot {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,59,107,0.5), inset 0 0 8px rgba(255,59,107,0.2); }
  50%      { box-shadow: 0 0 0 5px rgba(255,59,107,0), inset 0 0 8px rgba(255,59,107,0.4); }
}
@keyframes glow-pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.6; }
}
@keyframes float {
  0%,100% { transform: translateY(0px); }
  50%      { transform: translateY(-8px); }
}
@keyframes shimmer {
  from { background-position: -200% 0; }
  to   { background-position: 200% 0; }
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(12px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ===== BACKGROUND GRID PATTERN ===== */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(ellipse at 50% 50%, black 40%, transparent 80%);
}

/* ===== GLASSMORPHISM CARDS ===== */
.glass-card {
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 4px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
  transition: border-color 0.25s, box-shadow 0.25s;
  position: relative;
  overflow: hidden;
}
.glass-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.3), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.glass-card:hover::before { opacity: 1; }
.glass-card:hover {
  border-color: rgba(0,212,255,0.2);
  box-shadow: 0 4px 30px rgba(0,0,0,0.4), var(--glow-blue);
}

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  min-height: 44px; padding: 10px 22px;
  border: none; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: all 0.2s; text-decoration: none;
  white-space: nowrap; letter-spacing: 0.2px;
  position: relative; overflow: hidden;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: linear-gradient(135deg, #0ea5e9, #00d4ff);
  color: #0a0e1a;
  box-shadow: 0 4px 15px rgba(0,212,255,0.35);
}
.btn-primary:hover {
  background: linear-gradient(135deg, #00d4ff, #38bdf8);
  box-shadow: 0 4px 25px rgba(0,212,255,0.55);
  transform: translateY(-1px);
}
.btn-primary:disabled { background: var(--glass); color: var(--text3); box-shadow: none; cursor: not-allowed; transform: none; }
.btn-secondary {
  background: var(--glass2); color: var(--text2);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
.btn-danger { background: rgba(255,59,107,0.12); color: var(--red); border: 1px solid rgba(255,59,107,0.3); }
.btn-sm { min-height: 36px; padding: 7px 16px; font-size: 13px; border-radius: 8px; }
.btn-icon { min-height: 44px; min-width: 44px; padding: 0; border-radius: 10px; font-size: 18px; }

/* ===== FORMS ===== */
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 12px; font-weight: 700; color: var(--text3); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.6px; }
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: rgba(8,12,24,0.8);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px;
  color: var(--text); font-size: 15px; font-family: inherit;
  outline: none; transition: all 0.2s;
  -webkit-appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(0,212,255,0.12);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
.form-select { cursor: pointer; }
.form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.error-msg {
  background: rgba(255,59,107,0.1); border: 1px solid rgba(255,59,107,0.3);
  color: var(--red); padding: 12px 16px; border-radius: var(--radius-sm);
  font-size: 14px; margin-bottom: 16px; font-weight: 500;
}
.success-msg {
  background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.25);
  color: var(--green); padding: 12px 16px; border-radius: var(--radius-sm);
  font-size: 14px; margin-bottom: 16px;
}

/* ===== BADGES ===== */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
  white-space: nowrap;
}
.badge-inquiry  { background: rgba(0,212,255,0.12); color: var(--blue); border: 1px solid rgba(0,212,255,0.2); }
.badge-hot      { background: rgba(255,59,107,0.12); color: var(--red); border: 1px solid rgba(255,59,107,0.25); animation: pulse-hot 2.5s ease infinite; }
.badge-cold     { background: rgba(74,90,136,0.2); color: var(--text2); border: 1px solid rgba(74,90,136,0.3); }
.badge-qualified { background: rgba(168,85,247,0.12); color: var(--purple); border: 1px solid rgba(168,85,247,0.25); }
.badge-won      { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
.badge-closed   { background: rgba(36,43,72,0.5); color: var(--text3); border: 1px solid rgba(74,90,136,0.2); }
.badge-quote_sent, .badge-quote-sent { background: rgba(245,158,11,0.12); color: var(--amber); border: 1px solid rgba(245,158,11,0.25); }
.badge-default  { background: rgba(74,90,136,0.2); color: var(--text2); border: 1px solid rgba(74,90,136,0.3); }

.tag-chip {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 12px;
  font-size: 11px; font-weight: 600; margin: 2px;
  white-space: nowrap; letter-spacing: 0.2px;
}
.tag-hot    { background: rgba(255,59,107,0.15); color: var(--red); }
.tag-cold   { background: rgba(0,212,255,0.12); color: #7dd3fc; }
.tag-default { background: rgba(74,90,136,0.2); color: var(--text2); }

/* ===== SPINNER ===== */
.spinner {
  border: 3px solid rgba(0,212,255,0.15); border-top-color: var(--blue);
  border-radius: 50%; width: 36px; height: 36px;
  animation: spin 0.7s linear infinite; margin: 48px auto;
}
.spinner-sm { width: 18px; height: 18px; border-width: 2px; margin: 0; }

/* ===== SKELETON LOADER ===== */
.skeleton {
  background: linear-gradient(90deg, rgba(26,31,56,0.6) 25%, rgba(0,212,255,0.06) 50%, rgba(26,31,56,0.6) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s ease infinite;
  border-radius: 8px;
}

/* ===== LOGIN PAGE ===== */
.login-bg {
  position: fixed; inset: 0; z-index: -1;
  background: linear-gradient(-45deg, #080c18, #0d1a3a, #1a0a3a, #0a1a2a, #0a2a1a, #080c18);
  background-size: 500% 500%;
  animation: gradientShift 16s ease infinite;
}
.login-wrap {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px; position: relative;
}
.login-stars {
  position: fixed; inset: 0; overflow: hidden; z-index: -1; pointer-events: none;
}
.login-star {
  position: absolute; width: 2px; height: 2px;
  background: white; border-radius: 50%; animation: glow-pulse 3s ease infinite;
}
.login-card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 24px; padding: 40px 32px;
  width: 100%; max-width: 420px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 40px rgba(0,212,255,0.1), inset 0 1px 0 rgba(255,255,255,0.06);
  animation: cardIn 0.5s ease;
}
.login-brand { text-align: center; margin-bottom: 32px; }
.login-logo { font-size: 56px; margin-bottom: 14px; display: block; animation: float 4s ease-in-out infinite; }
.login-title {
  font-size: 24px; font-weight: 800; color: var(--text);
  background: linear-gradient(135deg, #e8eeff, #00d4ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.login-sub { font-size: 13px; color: var(--text3); margin-top: 5px; letter-spacing: 0.3px; }

/* ===== APP SHELL ===== */
.app-shell { display: flex; min-height: 100vh; position: relative; z-index: 1; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w); background: var(--glass);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0; position: sticky; top: 0; height: 100vh;
  z-index: 40;
}
.sidebar-brand {
  padding: 20px 18px; border-bottom: 1px solid var(--border);
}
.sidebar-logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
.sidebar-logo-icon { font-size: 22px; }
.sidebar-logo-img { width: 28px; height: 28px; object-fit: contain; }
.sidebar-title {
  font-size: 16px; font-weight: 800; color: var(--text);
  background: linear-gradient(135deg, #e8eeff, #00d4ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sidebar-sub { font-size: 11px; color: var(--text3); letter-spacing: 0.3px; }
.sidebar-nav { padding: 10px 8px; flex: 1; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 12px; border-radius: var(--radius-sm);
  cursor: pointer; color: var(--text2);
  font-size: 14px; font-weight: 600;
  transition: all 0.2s; margin-bottom: 2px; min-height: 44px;
  border: 1px solid transparent;
}
.nav-item:hover { background: rgba(0,212,255,0.06); color: var(--text); border-color: rgba(0,212,255,0.1); }
.nav-item.active {
  background: rgba(0,212,255,0.1); color: var(--blue);

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

/* =========================================
   CONSTANTS
   ========================================= */
const API = 'https://rapid-policies-backend-production.up.railway.app/api';
const BACKEND = 'https://rapid-policies-backend-production.up.railway.app';
let _token = null;

/* =========================================
   API HELPER
   ========================================= */
const api = async (path, opts = {}) => {
  const res = await fetch(`${API}${path}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...(_token ? { Authorization: `Bearer ${_token}` } : {}),
      ...(opts.headers || {}),
    },
  });
  if (res.status === 401) throw Object.assign(new Error('Unauthorized'), { status: 401 });
  if (!res.ok) {
    const t = await res.text().catch(() => '');
    throw Object.assign(new Error(`HTTP ${res.status}: ${t.slice(0,100)}`), { status: res.status });
  }
  const ct = res.headers.get('content-type') || '';
  return ct.includes('application/json') ? res.json() : res.text();
};

const normalizeList = (data, ...keys) => {
  if (!data) return [];
  if (Array.isArray(data)) return data;
  for (const k of keys) { if (Array.isArray(data[k])) return data[k]; }
  if (Array.isArray(data.data)) return data.data;
  return [];
};

/* =========================================
   FORMAT HELPERS
   ========================================= */
const fmt = {
  date: d => !d ? '—' : new Date(d).toLocaleDateString('en-AU', { day:'2-digit', month:'short', year:'numeric' }),
  dateTime: d => !d ? '—' : new Date(d).toLocaleString('en-AU', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }),
  currency: n => new Intl.NumberFormat('en-AU', { style:'currency', currency:'AUD', minimumFractionDigits:0, maximumFractionDigits:0 }).format(Number(n)||0),
  name: c => !c ? 'Unknown' : ((`${c.first_name||''} ${c.last_name||''}`).trim() || c.name || c.full_name || c.contact_name || 'Unknown'),
  phone: c => c?.phone || c?.phone_number || c?.mobile || '',
  email: c => c?.email || c?.email_address || '',
};

    const start = Date.now();
    const animate = () => {
      const p = Math.min((Date.now() - start) / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setVal(Math.floor(eased * target));
      if (p < 1) rafRef.current = requestAnimationFrame(animate);
      else setVal(target);
    };
    rafRef.current = requestAnimationFrame(animate);
    return () => rafRef.current && cancelAnimationFrame(rafRef.current);
  }, [target, duration]);
  return val;
};

   ========================================= */
const ToastCtx = createContext(null);
const useToast = () => useContext(ToastCtx);

const ToastProvider = ({ children }) => {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, type = 'info') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }, []);
  const icon = toast?.type === 'success' ? '✅ ' : toast?.type === 'error' ? '❌ ' : 'ℹ️ ';
  return (
    <ToastCtx.Provider value={show}>
      {children}
      {toast && <div className="toast">{icon}{toast.msg}</div>}
    </ToastCtx.Provider>
  );
};

const DashboardPage = ({ onUnauth }) => {
  const toast = useToast();
  const [loading, setLoading] = useState(true);
  const [metrics, setMetrics] = useState({ total:0, hot:0, quotes:0, revenue:0 });
  const [activity, setActivity] = useState({ calls:0, emails:0, forms:0, jobs:0 });
  const c1r=useRef(null), c2r=useRef(null), c3r=useRef(null), c4r=useRef(null);
  const charts = useRef({});

  useEffect(() => { load(); return () => Object.values(charts.current).forEach(c => c?.destroy()); }, []);

  const load = async () => {
    setLoading(true);
    try {
      const [contacts, calls, emails, forms, invoices] = await Promise.allSettled([
        api('/contacts?limit=1000'), api('/calls?limit=500'),
        api('/emails?limit=500'), api('/registration_forms?limit=200'),
        api('/xero_invoices?limit=200'),
      ]);
      const cl   = normalizeList(contacts.value, 'contacts','leads','items');
      const callL = normalizeList(calls.value,    'calls','items');
      const emailL = normalizeList(emails.value,  'emails','items');
      const formL  = normalizeList(forms.value,   'forms','items');
      const invL   = normalizeList(invoices.value,'invoices','items');

      const hotLeads = cl.filter(c => {
        const s = (c.status||'').toLowerCase();
        const tags = c.tags||[];
        return s==='hot' || tags.some(t=>(typeof t==='string'?t:t.name||'').toLowerCase().includes('hot'));
      }).length;
      const totalRev = invL.reduce((s,i)=>s+parseFloat(i.total_amount||i.amount_due||i.total||i.amount||0),0);
      const now = new Date(), ms = new Date(now.getFullYear(),now.getMonth(),1);

      setMetrics({ total:cl.length, hot:hotLeads, quotes:invL.length, revenue:totalRev });
      setActivity({
        calls:  callL.filter(c=>c.created_at&&new Date(c.created_at)>=ms).length,
        emails: emailL.filter(e=>e.created_at&&new Date(e.created_at)>=ms).length,
        forms:  formL.filter(f=>f.created_at&&new Date(f.created_at)>=ms).length,
        jobs:   cl.filter(c=>['qualified','hot','won'].includes((c.status||'').toLowerCase())).length,
      });
      setLoading(false);
      setTimeout(() => buildCharts(cl, invL), 200);
    } catch(err) {
      if (err.status===401) { onUnauth(); return; }
      toast('Dashboard data unavailable — check API connection', 'error');
      setLoading(false);
    }
  };

  const buildCharts = (contacts, invoices) => {
    Object.values(charts.current).forEach(c=>c?.destroy()); charts.current={};
    const chartDefaults = {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
    };
    const xScale = { ticks:{color:'#4a5a88',font:{size:10}}, grid:{color:'rgba(0,212,255,0.04)'} };
    const yScale = { ticks:{color:'#4a5a88',font:{size:10}}, grid:{color:'rgba(255,255,255,0.04)'}, beginAtZero:true };

    if (c1r.current) {
      const lbls=[], cnts=[];
      for(let i=29;i>=0;i--){
        const d=new Date(); d.setDate(d.getDate()-i);
        const s=new Date(d); s.setHours(0,0,0,0); const e=new Date(d); e.setHours(23,59,59,999);
        lbls.push(i%5===0||i===0?d.toLocaleDateString('en-AU',{day:'2-digit',month:'short'}):'');
        cnts.push(contacts.filter(c=>c.created_at&&new Date(c.created_at)>=s&&new Date(c.created_at)<=e).length);
      }
      charts.current.c1 = new Chart(c1r.current, { type:'line',
        data:{ labels:lbls, datasets:[{ data:cnts, borderColor:'#00d4ff', backgroundColor:'rgba(0,212,255,0.08)', tension:0.4, fill:true, pointRadius:2, borderWidth:2 }] },
        options:{ ...chartDefaults, scales:{ x:xScale, y:yScale } }
      });
    }
    if (c2r.current) {
      const lbls=[], revs=[];
      for(let i=5;i>=0;i--){
        const d=new Date(); d.setMonth(d.getMonth()-i);
        lbls.push(d.toLocaleDateString('en-AU',{month:'short',year:'2-digit'}));
        const ms2=new Date(d.getFullYear(),d.getMonth(),1), me2=new Date(d.getFullYear(),d.getMonth()+1,0);
        revs.push(invoices.filter(inv=>inv.created_at&&new Date(inv.created_at)>=ms2&&new Date(inv.created_at)<=me2).reduce((s,i)=>s+parseFloat(i.total_amount||i.amount_due||i.total||i.amount||0),0));
      }
      charts.current.c2 = new Chart(c2r.current, { type:'line',
        data:{ labels:lbls, datasets:[{ data:revs, borderColor:'#00ff88', backgroundColor:'rgba(0,255,136,0.07)', tension:0.4, fill:true, pointRadius:4, borderWidth:2 }] },
        options:{ ...chartDefaults, scales:{ x:xScale, y:{ ...yScale, ticks:{...yScale.ticks,callback:v=>`$${(v/1000).toFixed(0)}k`} } } }
      });
    }
    if (c3r.current) {
      const srcs=['email','phone','form','telegram','synthflow','website','google_sheets'];
      charts.current.c3 = new Chart(c3r.current, { type:'bar',
        data:{ labels:srcs.map(s=>s.charAt(0).toUpperCase()+s.slice(1).replace('_',' ')),
          datasets:[{ data:srcs.map(s=>contacts.filter(c=>(c.source||'').toLowerCase()===s).length),
            backgroundColor:['rgba(0,212,255,0.7)','rgba(0,255,136,0.7)','rgba(168,85,247,0.7)','rgba(34,211,238,0.7)','rgba(245,158,11,0.7)','rgba(99,102,241,0.7)','rgba(236,72,153,0.7)'],
            borderRadius:6 }] },
        options:{ ...chartDefaults, scales:{ x:xScale, y:yScale } }
      });
    }
    if (c4r.current) {
      const statuses=['inquiry','hot','cold','qualified','won','closed'];
      const cnts=statuses.map(s=>contacts.filter(c=>(c.status||'').toLowerCase()===s).length);
      if(cnts.some(n=>n>0)) {
        charts.current.c4 = new Chart(c4r.current, { type:'doughnut',
          data:{ labels:statuses.map(s=>s.charAt(0).toUpperCase()+s.slice(1)),
            datasets:[{ data:cnts, backgroundColor:['rgba(0,212,255,0.8)','rgba(255,59,107,0.8)','rgba(74,90,136,0.6)','rgba(168,85,247,0.8)','rgba(0,255,136,0.8)','rgba(36,43,72,0.8)'], borderWidth:2, borderColor:'#0d1224' }] },
          options:{ responsive:true, maintainAspectRatio:false, cutout:'65%', plugins:{ legend:{ position:'bottom', labels:{ color:'#8899cc', font:{size:10}, boxWidth:10, padding:8 } } } }
        });
      }
    }
  };

  if (loading) return <div className="page-body"><div className="spinner" /></div>;

  return (
    <div>
      <div className="page-header">
        <div className="page-title">Mission Control</div>
        <div className="page-sub">Real-time pipeline overview</div>
      </div>
      <div className="page-body">
        <div className="metrics-grid">
          <MetricCard label="Total Leads"  target={metrics.total}   icon={'\u{1F465}'} sub="All time" />
          <MetricCard label="Hot Leads"    target={metrics.hot}     icon={'\u{1F525}'} colorClass="red"   sub="Needs attention" />
          <MetricCard label="Quotes Sent"  target={metrics.quotes}  icon={'\u{1F4C4}'} colorClass="amber" sub="Total issued" />
          <MetricCard label="Revenue"      target={metrics.revenue} icon={'\u{1F4B0}'} colorClass="green" sub="Total payments" isCurrency />
        </div>
        <div className="charts-row">
          <GlassCard className="chart-card" style={{padding:18}}>
            <div className="chart-title">{'\u{1F4C8}'} Leads In — Last 30 Days</div>
            <div className="chart-wrap"><canvas ref={c1r}></canvas></div>
          </GlassCard>
          <GlassCard className="chart-card" style={{padding:18}}>
            <div className="chart-title">{'\u{1F4B5}'} Revenue by Month</div>
            <div className="chart-wrap"><canvas ref={c2r}></canvas></div>
          </GlassCard>
        </div>
        <div className="charts-row">
          <GlassCard className="chart-card" style={{padding:18}}>
            <div className="chart-title">{'\u{1F4CA}'} Leads by Source</div>
            <div className="chart-wrap"><canvas ref={c3r}></canvas></div>
          </GlassCard>
          <GlassCard className="chart-card" style={{padding:18}}>
            <div className="chart-title">{'\u{1F3AF}'} Status Breakdown</div>
            <div className="chart-wrap"><canvas ref={c4r}></canvas></div>
          </GlassCard>
        </div>
        <div className="activity-grid">
          {[
            {icon:'\u{1F4DE}',val:activity.calls,  lbl:'Calls this month'},
            {icon:'✉️',val:activity.emails, lbl:'Emails this month'},
            {icon:'\u{1F4CB}',val:activity.forms,  lbl:'Form submissions'},
            {icon:'⚡',val:activity.jobs,   lbl:'Jobs in progress'},
          ].map(a=>(
            <GlassCard key={a.lbl} className="activity-card" style={{padding:18}}>
              <span className="ac-icon">{a.icon}</span>
              <div><div className="ac-val">{a.val}</div><div className="ac-lbl">{a.lbl}</div></div>
            </GlassCard>
          ))}
        </div>
      </div>
    </div>
  );
};

const ContactPanel = ({ contact:init, onClose, onUpdate }) => {
  const toast = useToast();
  const [contact, setContact] = useState(init);
  const [timeline, setTimeline] = useState([]);
  const [tlLoading, setTlLoading] = useState(true);
  const [status, setStatus] = useState(init.status||'inquiry');
  const [note, setNote] = useState('');
  const [saving, setSaving] = useState(false);
  const [addingNote, setAddingNote] = useState(false);

  useEffect(()=>{ loadTimeline(); },[contact.id]);

  const loadTimeline = async ()=>{
    setTlLoading(true);
    const id=contact.id;
    const [acts,emails,calls,forms] = await Promise.allSettled([
      api(`/activities?contact_id=${id}&limit=50`),
      api(`/emails?contact_id=${id}&limit=30`),
      api(`/calls?contact_id=${id}&limit=20`),
      api(`/registration_forms?contact_id=${id}&limit=10`),
    ]);
    let tl=[];
    normalizeList(emails.value,'emails').forEach(e=>tl.push({type:'email',title:e.subject||'Email received',desc:e.snippet||(e.body||'').slice(0,100),time:e.created_at||e.received_at}));
    normalizeList(calls.value,'calls').forEach(c=>tl.push({type:'call',title:`Call${c.duration_seconds?` (${Math.round(c.duration_seconds/60)}m)`:''}`,desc:c.notes||(c.transcript||'').slice(0,100),time:c.created_at||c.called_at}));
    normalizeList(forms.value,'forms').forEach(f=>tl.push({type:'form',title:'Form submission',desc:f.policy_type||f.form_type||'',time:f.created_at}));
    normalizeList(acts.value,'activities').forEach(a=>tl.push({type:a.type||a.activity_type||'activity',title:a.title||a.activity_type||'Activity',desc:a.description||a.notes||'',time:a.created_at}));
    tl.sort((a,b)=>new Date(b.time||0)-new Date(a.time||0));
    setTimeline(tl); setTlLoading(false);
  };

  const updateStatus = async(s)=>{
    setStatus(s); setSaving(true);
    try{
      await api(`/contacts/${contact.id}`,{method:'PATCH',body:JSON.stringify({status:s})});
      const u={...contact,status:s}; setContact(u); onUpdate(u);
      toast('Status updated','success');
    }catch(e){ toast('Failed to update status','error'); }
    finally{ setSaving(false); }
  };

  const addNote = async()=>{
    if(!note.trim()) return;
    setAddingNote(true);
    try{
      await api('/activities',{method:'POST',body:JSON.stringify({contact_id:contact.id,type:'note',title:'Note',description:note})});
      setNote(''); toast('Note saved','success'); loadTimeline();
    }catch(e){ toast('Failed to save note','error'); }
    finally{ setAddingNote(false); }
  };

  const tags=contact.tags||[], name=fmt.name(contact);
  return (
    <>
      <div className="panel-overlay" onClick={onClose}/>
      <div className="panel-drawer">
        <div className="panel-top">
          <div>
            <div className="panel-name">{name}</div>
            <div className="panel-meta">{contact.source&&<>{SOURCE_ICONS[contact.source]||'❓'} {contact.source} · </>}Added {fmt.date(contact.created_at)}</div>
          </div>
          <button className="panel-close" onClick={onClose}>✕</button>
        </div>
        <div className="panel-body">
          <div className="quick-actions">
            {fmt.phone(contact)&&<a href={`tel:${fmt.phone(contact)}`} className="quick-btn"><span className="qb-icon">{'\u{1F4DE}'}</span>Call</a>}
            {fmt.email(contact)&&<a href={`mailto:${fmt.email(contact)}`} className="quick-btn"><span className="qb-icon">✉️</span>Email</a>}
            {fmt.phone(contact)&&<a href={`https://wa.me/${fmt.phone(contact).replace(/\D/g,'')}`} target="_blank" className="quick-btn"><span className="qb-icon">{'\u{1F4AC}'}</span>WhatsApp</a>}
          </div>
          <div className="info-grid">
            <div className="info-item"><label>Phone</label><p>{fmt.phone(contact)||'—'}</p></div>
            <div className="info-item"><label>Email</label><p style={{fontSize:12,wordBreak:'break-word'}}>{fmt.email(contact)||'—'}</p></div>
            <div className="info-item"><label>Company</label><p>{contact.company||contact.company_name||'—'}</p></div>
            <div className="info-item"><label>Policy Type</label><p>{contact.policy_type||'—'}</p></div>
          </div>
          <div className="section-heading">Tags</div>
          <div style={{marginBottom:16}}>
            {tags.length>0?tags.map((t,i)=><TagChip key={i} tag={t}/>):<span style={{fontSize:13,color:'var(--text3)'}}>No tags assigned</span>}
          </div>
          <div className="section-heading">Status {saving&&'…'}</div>
          <select className="form-select" style={{marginBottom:20}} value={status} onChange={e=>updateStatus(e.target.value)}>
            {['inquiry','hot','cold','qualified','quote_sent','won','closed'].map(s=><option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1).replace('_',' ')}</option>)}
          </select>
          <div className="section-heading">Add Note / Activity</div>
          <textarea className="form-textarea" value={note} onChange={e=>setNote(e.target.value)} placeholder="Log a call, note, or follow-up..." />
          <button className="btn btn-primary btn-sm" style={{marginTop:8}} onClick={addNote} disabled={addingNote||!note.trim()}>
            {addingNote?'Saving…':'Save Note'}
          </button>
          <div className="section-heading" style={{marginTop:24}}>Activity Timeline</div>
          {tlLoading?<div className="spinner spinner-sm" style={{margin:'20px auto'}} />:(
            <div>
              {timeline.length===0&&<div className="empty-state"><div className="es-icon">{'\u{1F550}'}</div><p>No activity recorded yet.</p></div>}
              {timeline.map((item,i)=>(
                <div key={i} className="tl-item">
                  <div className={`tl-dot tl-dot-${item.type}`}/>
                  <div className="tl-body">
                    <div className="tl-title">{item.title}</div>
                    {item.desc&&<div className="tl-desc">{item.desc}</div>}
                    <div className="tl-time">{fmt.dateTime(item.time)}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </>
  );
};

/* =========================================
   CONTACTS PAGE
   ========================================= */
const ContactsPage = ({ onUnauth }) => {
  const toast = useToast();
  const [contacts, setContacts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [filterSource, setFilterSource] = useState('');
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);

  useEffect(()=>{load();},[]);

  const load = async()=>{
    setLoading(true);
    try{
      const data = await api('/contacts?limit=1000');
      setContacts(normalizeList(data,'contacts','leads','items'));
    }catch(e){
      if(e.status===401){onUnauth();return;}
      toast('Failed to load contacts','error');
    }finally{setLoading(false);}
  };

  const filtered = contacts.filter(c=>{
    const n=fmt.name(c).toLowerCase();
    return(!search||n.includes(search.toLowerCase())||(c.email||'').toLowerCase().includes(search.toLowerCase())||(c.phone||'').includes(search))
      &&(!filterStatus||(c.status||'').toLowerCase()===filterStatus)
      &&(!filterSource||(c.source||'').toLowerCase()===filterSource);
  });

  const handleUpdate=u=>{setContacts(p=>p.map(c=>c.id===u.id?u:c));if(selected?.id===u.id)setSelected(u);};
  const handleSaved=n=>{setContacts(p=>[n,...p]);setSelected(n);};

  if(loading) return <div className="page-body"><div className="spinner"/></div>;

  return (
    <div>
      <div className="page-header" style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
        <div>
          <div className="page-title">Contacts</div>
          <div className="page-sub">{filtered.length} contact{filtered.length!==1?'s':''} {(search||filterStatus||filterSource)?'(filtered)':'total'}</div>
        </div>
        <button className="btn btn-primary btn-sm" style={{marginTop:4}} onClick={()=>setShowAdd(true)}>+ Add Lead</button>
      </div>
      <div className="page-body">
        <div className="toolbar">
          <div className="search-wrap">
            <span className="search-icon">{'\u{1F50D}'}</span>
            <input className="search-input" type="text" placeholder="Search name, email, phone..."
              value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <div className="toolbar-row">
            <select className="filter-select" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
              <option value="">All Statuses</option>
              {['inquiry','hot','cold','qualified','won','closed'].map(s=><option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
            </select>
            <select className="filter-select" value={filterSource} onChange={e=>setFilterSource(e.target.value)}>
              <option value="">All Sources</option>
              {['email','phone','form','telegram','synthflow','website','google_sheets'].map(s=><option key={s} value={s}>{SOURCE_ICONS[s]} {s.charAt(0).toUpperCase()+s.slice(1).replace('_',' ')}</option>)}
            </select>
            <button className="btn btn-secondary btn-sm" onClick={load}>↻ Refresh</button>

          {filtered.map(c=>{
            const tags=c.tags||[];
            return(
              <GlassCard key={c.id} className="contact-card" style={{padding:14}} onClick={()=>setSelected(c)}>
                <div className="contact-card-header">
                  <div><div className="contact-card-name">{fmt.name(c)}</div><div className="contact-card-meta">{fmt.phone(c)||fmt.email(c)||'—'}</div></div>
                  <StatusBadge status={c.status}/>
                </div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:13,color:'var(--text3)'}}>{SOURCE_ICONS[c.source]||SOURCE_ICONS.default} {c.source||'—'}</span>
                  <span style={{fontSize:12,color:'var(--text3)'}}>{fmt.date(c.created_at)}</span>
                </div>
                {tags.length>0&&<div className="contact-card-tags">{tags.slice(0,3).map((t,i)=><TagChip key={i} tag={t}/>)}{tags.length>3&&<span style={{fontSize:11,color:'var(--text3)'}}>+{tags.length-3}</span>}</div>}
              </GlassCard>
            );
          })}
        </div>
        {/* Desktop table */}
        <div className="table-wrap">
          <table className="data-table">
            <thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Source</th><th>Status</th><th>Tags</th><th>Created</th></tr></thead>
            <tbody>
              {filtered.length===0&&<tr><td colSpan={7} style={{textAlign:'center',padding:'40px',color:'var(--text3)'}}>No contacts found.</td></tr>}
              {filtered.map(c=>{
                const tags=c.tags||[];
                return(
                  <tr key={c.id} onClick={()=>setSelected(c)}>
                    <td className="td-name">{fmt.name(c)}</td>
                    <td>{fmt.phone(c)||'—'}</td>
                    <td style={{fontSize:12}}>{fmt.email(c)||'—'}</td>
                    <td>{SOURCE_ICONS[c.source]||SOURCE_ICONS.default} {c.source||'—'}</td>
                    <td><StatusBadge status={c.status}/></td>
                    <td>{tags.slice(0,2).map((t,i)=><TagChip key={i} tag={t}/>)}{tags.length>2&&<span style={{fontSize:11,color:'var(--text3)'}}> +{tags.length-2}</span>}</td>
                    <td style={{fontSize:12,color:'var(--text3)'}}>{fmt.date(c.created_at)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {selected&&<ContactPanel contact={selected} onClose={()=>setSelected(null)} onUpdate={handleUpdate}/>}
      {showAdd&&<AddContactModal onClose={()=>setShowAdd(false)} onSaved={handleSaved}/>}
    </div>
  );
};

/* =========================================
   PIPELINE (KANBAN)
   ========================================= */
const PipelinePage = ({ onUnauth }) => {
  const toast = useToast();
  const [contacts, setContacts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [dragging, setDragging] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [selected, setSelected] = useState(null);

  useEffect(()=>{load();},[]);

  const load = async()=>{
    setLoading(true);
    try{
      const data=await api('/contacts?limit=1000');
      setContacts(normalizeList(data,'contacts','leads','items'));
    }catch(e){
      if(e.status===401){onUnauth();return;}
      toast('Failed to load pipeline','error');
    }finally{setLoading(false);}
  };

  const onDragStart=(e,c)=>{setDragging(c);e.dataTransfer.effectAllowed='move';};
  const onDragOver=(e,id)=>{e.preventDefault();e.dataTransfer.dropEffect='move';setDragOver(id);};
  const onDrop=async(e,id)=>{
    e.preventDefault();
    if(!dragging||dragging.status===id){setDragging(null);setDragOver(null);return;}
    const prev=[...contacts];
    setContacts(cs=>cs.map(c=>c.id===dragging.id?{...c,status:id}:c));
    setDragging(null);setDragOver(null);
    try{await api(`/contacts/${dragging.id}`,{method:'PATCH',body:JSON.stringify({status:id})});toast('Stage updated','success');}
    catch(e){setContacts(prev);toast('Failed to update stage','error');}
  };
  const handleUpdate=u=>{setContacts(p=>p.map(c=>c.id===u.id?u:c));if(selected?.id===u.id)setSelected(u);};

  if(loading) return <div className="page-body"><div className="spinner"/></div>;

  return (
    <div>
      <div className="page-header">
        <div className="page-title">Pipeline</div>
        <div className="page-sub">Drag cards to advance leads · {contacts.length} total</div>
      </div>
      <div className="page-body">
        <div className="kanban-board">
          {STAGES.map(stage=>{
            const cards=contacts.filter(c=>{
              const s=(c.status||'').toLowerCase().replace(/\s+/g,'_');
              return s===stage.id||(stage.id==='hot'&&(s==='hot_lead'||s==='hotlead'));
            });
            return(
              <div key={stage.id} className="kanban-col" style={{borderTop:`2px solid ${stage.color}`}}>
                <div className="kanban-col-head">
                  <div className="kanban-col-title" style={{color:stage.color}}>{stage.label}</div>
                  <div className="kanban-col-count">{cards.length} lead{cards.length!==1?'s':''}</div>
                </div>
                <div className={`kanban-cards kanban-drop ${dragOver===stage.id?'drag-over':''}`}
                  onDragOver={e=>onDragOver(e,stage.id)}
                  onDrop={e=>onDrop(e,stage.id)}
                  onDragLeave={()=>setDragOver(null)}>
                  {cards.length===0&&<div style={{padding:'16px 8px',textAlign:'center',fontSize:12,color:'var(--text3)',opacity:0.5}}>Drop here</div>}
                  {cards.map(c=>(
                    <div key={c.id} className={`kanban-card ${dragging?.id===c.id?'dragging':''}`}
                      draggable onDragStart={e=>onDragStart(e,c)} onClick={()=>setSelected(c)}>
                      <div className="kc-name">{fmt.name(c)}</div>
                      <div className="kc-phone">{fmt.phone(c)||fmt.email(c)||'—'}</div>
                      <div className="kc-footer">
                        <span className="kc-source">{SOURCE_ICONS[c.source]||SOURCE_ICONS.default}</span>
                        {c.value&&<span className="kc-value">{fmt.currency(c.value)}</span>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {selected&&<ContactPanel contact={selected} onClose={()=>setSelected(null)} onUpdate={handleUpdate}/>}
    </div>
  );
};
